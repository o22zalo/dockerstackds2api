# ================================================================
#  compose.apps.yml — Application Layer
#  Runs DS2API as the app service while preserving stack routing.
#
#  Subdomain: ${PROJECT_NAME}.${DOMAIN}
#
#  Minimal required env:
#    APP_PORT   — Port app listens on inside container
#    PROJECT_NAME, DOMAIN, CADDY_AUTH_USER, CADDY_AUTH_HASH
#    DS2API_CONFIG_JSON — base64-encoded DS2API config.json
# ================================================================

services:
  app:
    container_name: "main-app"
    image: ghcr.io/cjackhwang/ds2api:latest
    # Compose vẫn ưu tiên giá trị khai báo explicit trong environment bên dưới.
    env_file:
      - ./.env
    environment:
      TZ: "${DS2API_TZ:-Asia/Ho_Chi_Minh}"
      LOG_LEVEL: "${DS2API_LOG_LEVEL:-INFO}"
      PORT: "${APP_PORT:-5001}"
      DS2API_ADMIN_KEY: "${DS2API_ADMIN_KEY}"
      DS2API_CONFIG_JSON: "${DS2API_CONFIG_JSON}"
      DS2API_CONFIG_PATH: "${DS2API_CONFIG_PATH:-/data/config.json}"
      DS2API_API_KEY: "${DS2API_API_KEY:-}"
      DS2API_MODEL: "${DS2API_MODEL:-deepseek-v4-flash}"
    ports:
      - "127.0.0.1:${APP_HOST_PORT:-6011}:${APP_PORT:-5001}"
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/app/data:/data
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/app/logs:/app/logs
    labels:
      # Public HTTP sites behind Cloudflare Tunnel.
      - "caddy=http://${PROJECT_NAME}.${DOMAIN}, http://main.${DOMAIN}, http://${DOMAIN}, http://${PROJECT_NAME_TAILSCALE}.${TAILSCALE_TAILNET_DOMAIN}"
      - "caddy.reverse_proxy={{upstreams ${APP_PORT:-5001}}}"
      - "caddy.basic_auth=/*"
      - "caddy.basic_auth.${CADDY_AUTH_USER:-admin}=${CADDY_AUTH_HASH}"
      # Internal HTTPS site for Tailscale / trusted LAN access.
      - "caddy_1=https://${PROJECT_NAME_TAILSCALE:-myapp}.${TAILSCALE_TAILNET_DOMAIN:-tailnet.local}"
      - "caddy_1.tls=internal"
      - "caddy_1.reverse_proxy={{upstreams ${APP_PORT:-3000}}}"
      - "caddy_1.basic_auth=/*"
      - "caddy_1.basic_auth.${CADDY_AUTH_USER:-admin}=${CADDY_AUTH_HASH}"
    networks: [app_net]
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "sh"
        - "-c"
        - "wget -qO- http://localhost:${APP_PORT:-5001}${HEALTH_PATH:-/healthz} || exit 1"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
