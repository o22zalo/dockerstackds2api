# ================================================================
#  compose.core.yml — Core Infrastructure
#  Always included: reverse proxy (Caddy) + tunnel (Cloudflare)
#
#  Required env:
#    PROJECT_NAME, DOMAIN, CADDY_EMAIL, CADDY_AUTH_USER,
#    CADDY_AUTH_HASH, CF_TUNNEL_TOKEN (or credentials file)
# ================================================================

networks:
  # Defined once here for the whole merged stack; overlay files join it by name.
  app_net:
    name: ${PROJECT_NAME:-myapp}_net

services:
  # ── Caddy: auto reverse proxy via Docker labels ────────────────
  caddy:
    container_name: "caddy"
    image: lucaslorentz/caddy-docker-proxy:2.9.1-alpine
    ports:
      - "80:80"
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/caddy/data:/data
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/caddy/config:/config
    environment:
      CADDY_INGRESS_NETWORKS: ${PROJECT_NAME:-myapp}_net
    labels:
      caddy.email: "${CADDY_EMAIL}"
      caddy.auto_https: "disable_redirects"
      # ── Tinyauth forward_auth snippet (reusable) ──
      caddy_0: "(tinyauth_forwarder)"
      caddy_0.forward_auth: "tinyauth:3000"
      caddy_0.forward_auth.uri: "/api/auth/caddy"
    networks: [app_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Tinyauth: lightweight auth gateway with persistent sessions ─
  tinyauth:
    container_name: "tinyauth"
    image: ghcr.io/steveiliop56/tinyauth:v5
    environment:
      TINYAUTH_APPURL: "https://auth.${DOMAIN}"
      TINYAUTH_AUTH_USERS: "${TINYAUTH_AUTH_USERS}"
      TINYAUTH_SECRET: "${TINYAUTH_SECRET}"
      TINYAUTH_AUTH_SESSIONEXPIRY: "${TINYAUTH_AUTH_SESSION_EXPIRY_SEC:-604800}"
      TINYAUTH_DATABASE_PATH: "/data/tinyauth.db"
      TINYAUTH_ANALYTICS_ENABLED: "false"
      TINYAUTH_LOG_LEVEL: "info"
      TINYAUTH_UI_WARNINGSENABLED: "false"
    volumes:
      - ${DOCKER_VOLUMES_ROOT:-./.docker-volumes}/tinyauth/data:/data
    labels:
      - "caddy=http://auth.${DOMAIN}"
      - "caddy.reverse_proxy={{upstreams 3000}}"
    networks: [app_net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Cloudflared: expose to Internet without opening ports ──────
  cloudflared:
    container_name: "cloudflared"
    image: cloudflare/cloudflared:latest
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    networks: [app_net]
    restart: unless-stopped
    depends_on:
      caddy:
        condition: service_healthy
